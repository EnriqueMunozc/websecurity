{% extends 'layouts/base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container py-5">

    <h1 class="mb-4">
        Dashboard
    </h1>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card dashboard-card shadow text-center">

                <div class="card-body">

                    <i class="bi bi-laptop display-4 dashboard-icon"></i>

                    <h5 class="mt-3">

                        Equipos

                    </h5>

                    <h1>

                        {{ equipos }}

                    </h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card shadow text-center">

                <div class="card-body">

                    <i class="bi bi-people display-4 dashboard-icon"></i>

                    <h5>

                        Empleados

                    </h5>

                    <h1>

                        {{ empleados }}

                    </h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card shadow text-center">

                <div class="card-body">

                    <i class="bi bi-clipboard-check display-4 dashboard-icon"></i>

                    <h5>

                        Asignaciones

                    </h5>

                    <h1>

                        {{ asignaciones }}

                    </h1>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card dashboard-card shadow text-center">

                <div class="card-body">

                    <i class="bi bi-check-circle display-4 dashboard-icon text-success"></i>

                    <h5>

                        Disponibles

                    </h5>

                    <h1>

                        {{ disponibles }}

                    </h1>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
