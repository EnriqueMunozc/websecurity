{% extends 'layouts/base.html' %}

{% block title %}
{{ titulo }}
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h3>{{ titulo }}</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ formulario.as_p }}

                <button class="btn btn-success">

                    Guardar

                </button>

                <a href="{% url 'lista_empleados' %}"
                   class="btn btn-secondary">

                    Cancelar

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
